services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./apps/api/.env
    volumes:
      - ./apps/api:/app          # 코드 변경 즉시 반영
      - api_fonts:/app/fonts     # 폰트 캐시 유지
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  api_fonts:
